services:
  postgres:
    image: postgres:16
    container_name: ecomm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecomm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ecomm_postgres_data:/var/lib/postgresql/data

volumes:
  ecomm_postgres_data: